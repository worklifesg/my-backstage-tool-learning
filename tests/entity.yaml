apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: shopping-cart
spec:
  dependsOn:
    - component:default/inventory-service
  type: website
  lifecycle: production
  owner: user:default/alice
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: inventory-service
spec:
  type: service
  lifecycle: production
  owner: group:default/ecommerce
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: ecommerce
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: alice
spec:
  memberOf: [group:default/ecommerce]