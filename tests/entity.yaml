apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: shopping-app
  description: The shopping app domain responsible for managing all shopping-related components and systems.
spec:
  owner: group:default/ecommerce
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: purchasing
  description: The purchasing system responsible for handling orders and payments.
spec:
  owner: group:default/ecommerce
  lifecycle: production
  type: system
  domain: shopping-app
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: shopping-cart
spec:
  dependsOn:
    - component:default/inventory-service
  type: website
  lifecycle: production
  owner: user:default/alice
  system: purchasing
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: inventory-service
spec:
  type: service
  lifecycle: production
  owner: group:default/ecommerce
  system: purchasing
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: ecommerce
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: alice
spec:
  memberOf: [group:default/ecommerce]