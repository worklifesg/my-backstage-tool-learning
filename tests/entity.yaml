apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: shopping-app
  description: The shopping app domain responsible for managing all shopping-related components and systems.
spec:
  owner: group:default/ecommerce
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: purchasing
  description: The purchasing system responsible for handling orders and payments.
spec:
  owner: group:default/ecommerce
  lifecycle: production
  type: system
  domain: shopping-app
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: shopping-cart
spec:
  dependsOn:
    - component:default/inventory-service
  type: website
  lifecycle: production
  owner: user:default/alice
  system: purchasing
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: inventory-service
spec:
  dependsOn:
    - resource:default/inventory-db
  type: service
  lifecycle: production
  owner: group:default/ecommerce
  system: purchasing
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: ecommerce
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: alice
spec:
  memberOf: [group:default/ecommerce]
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: inventory-db
  description: Database resource for inventory service
spec:
  type: database
  owner: group:default/ecommerce
  system: purchasing
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: shopping-cart-api
  description: API for the shopping cart component
spec:
  type: openapi
  owner: user:default/alice
  apiProvidedBy: shopping-cart
  definition: |
    openapi: "3.0.0"
    info:
      version: 1.0.0
      title: Artist API
      license:
        name: MIT
    servers:
      - url: http://artist.spotify.net/v1
    paths:
      /artists:
        get:
          summary: List all artists
    ...
---
#Create simialr API for inventory-service
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: inventory-service-api
  description: API for the inventory service component
spec:
  type: openapi
  owner: group:default/ecommerce
  apiProvidedBy: inventory-service 
  definition: |
    openapi: "3.0.0"
    info:
      version: 1.0.0
      title: Inventory Service API
      license:
        name: MIT
    servers:
      - url: http://inventory-service.spotify.net/v1
    paths:
      /inventory:
        get:
          summary: List all inventory items
    ...